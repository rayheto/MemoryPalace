<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Randomized simulation to real test</title>
  <desc id="desc">Training in randomized simulation scenes transfers to real-world testing.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <style>
      text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.title{font-size:28px;font-weight:700}.body{font-size:21px}.small{font-size:18px;fill:#475569}
    </style>
  </defs>
  <rect width="1100" height="520" fill="#fff"/>
  <text x="60" y="55" class="title">仿真随机化训练 → 真实测试</text>
  <g transform="translate(80 110)">
    <text x="115" y="-22" class="body" font-weight="700">模拟器中训练</text>
    <g>
      <rect width="130" height="100" fill="#fee2e2"/><rect x="22" y="50" width="86" height="34" fill="#92400e"/><circle cx="50" cy="38" r="14" fill="#22c55e"/><rect x="78" y="25" width="22" height="22" fill="#3b82f6"/>
      <rect x="145" width="130" height="100" fill="#dcfce7"/><rect x="167" y="50" width="86" height="34" fill="#94a3b8"/><path d="M210 20 L234 60 L186 60 Z" fill="#f59e0b"/>
      <rect x="290" width="130" height="100" fill="#dbeafe"/><rect x="312" y="50" width="86" height="34" fill="#d97706"/><circle cx="354" cy="35" r="16" fill="#a855f7"/>
      <rect y="115" width="130" height="100" fill="#fef9c3"/><rect x="22" y="165" width="86" height="34" fill="#16a34a"/><rect x="50" y="130" width="26" height="26" fill="#ef4444"/>
      <rect x="145" y="115" width="130" height="100" fill="#f3e8ff"/><rect x="167" y="165" width="86" height="34" fill="#0ea5e9"/><circle cx="214" cy="151" r="15" fill="#f97316"/>
      <rect x="290" y="115" width="130" height="100" fill="#ffedd5"/><rect x="312" y="165" width="86" height="34" fill="#64748b"/><path d="M354 132 L382 177 L326 177 Z" fill="#22c55e"/>
    </g>
    <text x="78" y="250" class="small">随机化材质、光照、颜色、布局和物理参数</text>
  </g>
  <line x1="550" y1="240" x2="720" y2="240" stroke="#2563eb" stroke-width="6" marker-end="url(#arrow)"/>
  <g transform="translate(760 130)">
    <text x="78" y="-42" class="body" font-weight="700">现实中测试</text>
    <rect width="250" height="180" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <rect x="35" y="118" width="180" height="28" fill="#a16207"/>
    <circle cx="72" cy="86" r="23" fill="#2563eb"/>
    <rect x="122" y="61" width="44" height="44" fill="#f97316" transform="rotate(12 144 83)"/>
    <path d="M190 55 L220 105 L160 105 Z" fill="#16a34a"/>
    <text x="26" y="220" class="small">无需额外训练的随机场景配置</text>
  </g>
</svg>
