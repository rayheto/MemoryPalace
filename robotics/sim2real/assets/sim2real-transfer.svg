<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Sim2Real transfer</title>
  <desc id="desc">Policy trained in simulation and deployed in the real world.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}
      .panel{fill:#f8fafc;stroke:#94a3b8;stroke-width:2}
      .chip{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}
      .real{fill:#ecfdf5;stroke:#16a34a;stroke-width:2}
      .small{font-size:22px}.label{font-size:28px;font-weight:700}.caption{font-size:20px;fill:#475569}
    </style>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <text x="80" y="64" class="label">Simulation Training</text>
  <rect x="70" y="95" width="360" height="240" rx="16" class="panel"/>
  <g transform="translate(105 125)">
    <rect width="80" height="62" rx="8" class="chip"/><circle cx="40" cy="31" r="18" fill="#38bdf8"/>
    <rect x="105" width="80" height="62" rx="8" class="chip"/><rect x="126" y="16" width="38" height="30" fill="#f59e0b"/>
    <rect x="210" width="80" height="62" rx="8" class="chip"/><path d="M250 12 L273 52 L227 52 Z" fill="#22c55e"/>
    <rect y="88" width="80" height="62" rx="8" class="chip"/><rect x="18" y="14" width="44" height="34" fill="#a855f7"/>
    <rect x="105" y="88" width="80" height="62" rx="8" class="chip"/><circle cx="145" cy="119" r="18" fill="#ef4444"/>
    <rect x="210" y="88" width="80" height="62" rx="8" class="chip"/><path d="M250 100 L273 140 L227 140 Z" fill="#14b8a6"/>
  </g>
  <text x="150" y="372" class="caption">大量可控、可重复的仿真样本</text>

  <line x1="470" y1="215" x2="720" y2="215" stroke="#2563eb" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="505" y="190" class="small" font-weight="700">Sim2Real Transfer</text>

  <text x="805" y="64" class="label">Real-World Test</text>
  <rect x="770" y="95" width="360" height="240" rx="16" class="panel"/>
  <g transform="translate(810 130)">
    <rect width="270" height="150" rx="12" class="real"/>
    <rect x="35" y="88" width="205" height="28" fill="#94a3b8"/>
    <circle cx="86" cy="65" r="22" fill="#2563eb"/>
    <rect x="138" y="42" width="48" height="48" fill="#f97316" transform="rotate(12 162 66)"/>
    <path d="M215 42 L246 92 L184 92 Z" fill="#16a34a"/>
    <path d="M25 18 C75 4 110 22 145 12 S230 8 262 28" fill="none" stroke="#64748b" stroke-width="4"/>
  </g>
  <text x="823" y="372" class="caption">噪声、光照、装配误差和真实接触</text>
</svg>
