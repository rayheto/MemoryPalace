<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">How domain randomization works</title>
  <desc id="desc">Domain randomization acts through data expansion, feature robustness, and an expected-risk learning objective.</desc>
  <style>
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.title{font-size:28px;font-weight:700}.body{font-size:21px}.small{font-size:18px;fill:#475569}
    .box{fill:#f8fafc;stroke:#94a3b8;stroke-width:2}.accent{fill:#ecfeff;stroke:#0891b2;stroke-width:2}
  </style>
  <rect width="1200" height="520" fill="#fff"/>
  <text x="55" y="55" class="title">域随机化如何起作用</text>
  <g transform="translate(65 95)">
    <rect width="320" height="350" rx="16" class="box"/><text x="108" y="42" class="body" font-weight="700">数据增广</text>
    <path d="M65 220 C10 130 95 62 168 100 C218 28 330 92 258 168 C330 225 238 306 178 244 C116 315 58 275 65 220Z" fill="#bae6fd" stroke="#0284c7" stroke-width="3"/>
    <rect x="142" y="176" width="58" height="58" fill="#d6d3d1" stroke="#78716c" stroke-width="2"/>
    <text x="102" y="90" class="small">Real data</text><text x="65" y="260" class="small">Domain randomized data</text>
  </g>
  <g transform="translate(440 95)">
    <rect width="320" height="350" rx="16" class="box"/><text x="108" y="42" class="body" font-weight="700">特征强化</text>
    <g transform="translate(65 80)">
      <rect width="70" height="70" fill="#bbf7d0"/><text x="18" y="45" font-size="36" fill="#2563eb">A</text>
      <rect x="86" width="70" height="70" fill="#fde68a"/><text x="104" y="45" font-size="36" fill="#2563eb">A</text>
      <rect y="86" width="70" height="70" fill="#fbcfe8"/><text x="18" y="131" font-size="36" fill="#2563eb">A</text>
      <rect x="86" y="86" width="70" height="70" fill="#bfdbfe"/><text x="104" y="131" font-size="36" fill="#dc2626">B</text>
      <rect y="172" width="70" height="70" fill="#fed7aa"/><text x="18" y="217" font-size="36" fill="#2563eb">A</text>
      <rect x="86" y="172" width="70" height="70" fill="#dcfce7"/><text x="104" y="217" font-size="36" fill="#dc2626">B</text>
    </g>
    <text x="52" y="330" class="small">随机化背景，保留任务相关特征</text>
  </g>
  <g transform="translate(815 95)">
    <rect width="320" height="350" rx="16" class="box"/><text x="86" y="42" class="body" font-weight="700">数学问题变更</text>
    <text x="38" y="120" class="small">Standard ML task</text>
    <text x="38" y="170" font-size="25">θ* = arg min Lθ(D)</text>
    <text x="38" y="245" class="small">Meta / distribution task</text>
    <text x="38" y="295" font-size="23">θ* = arg min E[Lθ(D)]</text>
  </g>
</svg>
